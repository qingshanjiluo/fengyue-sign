name: 每日自动签到（Playwright）

on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 0:00（北京 8:00）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（Playwright + 浏览器）
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: 运行签到
        env:
          CHECKIN_EMAIL: ${{ secrets.CHECKIN_EMAIL }}
          CHECKIN_PASSWORD: ${{ secrets.CHECKIN_PASSWORD }}
        run: python checkin_playwright.py

      - name: 上传截图（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-screenshots
          path: |
            checkin_result.png
            login_error.png
